<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Horror Launcher</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a0000; color: #ffdddd; text-align: center; padding: 50px; }
        .container { max-width: 700px; margin: auto; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 15px; border: 3px solid #ff4444; }
        button { padding: 15px 40px; font-size: 20px; background: #ff4444; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #ff6666; }
        #status { margin-top: 20px; font-size: 18px; min-height: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Horror Launcher</h1>
        <p>Minecraft 1.19.2 Forge</p>
        <button onclick="startCompile()">🔨 Compiler le Launcher (EXE)</button>
        <p id="status">Prêt</p>
    </div>

    <script>
        function startCompile() {
            const status = document.getElementById('status');
            status.textContent = '🔄 Compilation en cours...';
            
            fetch('/compile')
                .then(() => {
                    let check = setInterval(() => {
                        fetch('/status')
                            .then(r => r.json())
                            .then(data => {
                                if (data.exe_ready) {
                                    clearInterval(check);
                                    status.textContent = '✅ Prêt ! Téléchargement...';
                                    window.location.href = '/download';
                                } else if (!data.running) {
                                    status.textContent = data.message;
                                }
                            });
                    }, 4000);
                });
        }
    </script>
</body>
</html>
