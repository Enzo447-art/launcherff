<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Horror Launcher</title>
    <style>
        body { font-family: Arial; background: #1a0000; color: #ffdddd; text-align: center; padding: 60px; }
        .container { max-width: 700px; margin: auto; background: rgba(0,0,0,0.85); padding: 50px; border-radius: 15px; border: 3px solid #ff4444; }
        button { padding: 18px 50px; font-size: 22px; background: #ff4444; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #ff6666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Horror Launcher</h1>
        <p>Minecraft 1.19.2 Forge + Mods auto</p>
        <button onclick="startCompile()">🔨 Compiler & Télécharger l'EXE</button>
        <p id="status" style="margin-top:25px; font-size:18px;"></p>
    </div>

    <script>
        function startCompile() {
            document.getElementById('status').innerHTML = '🔄 Compilation en cours... (20 à 40 secondes)';
            fetch('/compile').then(() => window.location.reload());
        }
    </script>
</body>
</html>
